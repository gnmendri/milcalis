<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON 52 — Military Fitness Program</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --bg2: #141720;
    --bg3: #1c2028;
    --bg4: #242830;
    --accent: #c8a84b;
    --accent2: #e6c96a;
    --red: #c0392b;
    --green: #27ae60;
    --text: #e8e4d8;
    --text2: #9a9488;
    --text3: #5a5650;
    --border: rgba(200,168,75,0.15);
    --border2: rgba(200,168,75,0.3);
    --phase-conditioning: #4a90d9;
    --phase-strength: #e67e22;
    --phase-endurance: #c0392b;
    --phase-power: #8e44ad;
    --phase-advanced: #16a085;
    --phase-peak: #c0392b;
    --phase-specialization: #d35400;
    --phase-integration: #27ae60;
    --phase-elite: #c8a84b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 200;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text2); font-weight: 400; font-size: 0.9rem; letter-spacing: 0.06em; display: block; margin-top: -4px; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .week-badge {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text2);
    text-transform: uppercase;
  }
  .week-badge strong { color: var(--accent); }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 64px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    height: calc(100vh - 64px);
    position: sticky;
    top: 64px;
  }

  .sidebar-header {
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .phase-group { margin-bottom: 4px; }

  .phase-label {
    padding: 8px 1.25rem 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .week-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 7px 1.25rem;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
    border-left: 2px solid transparent;
  }
  .week-btn:hover { background: var(--bg3); }
  .week-btn.active {
    background: var(--bg3);
    border-left-color: var(--accent);
  }

  .week-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text3);
    min-width: 26px;
    letter-spacing: 0.05em;
  }
  .week-btn.active .week-num { color: var(--accent); }

  .week-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .week-btn.active .week-title { color: var(--text); }

  .intensity-dot {
    margin-left: auto;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── MAIN CONTENT ── */
  .main {
    padding: 2rem;
    max-width: 900px;
  }

  /* ── WEEK HERO ── */
  .week-hero {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .week-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .tag-week { background: rgba(200,168,75,0.12); color: var(--accent); border: 1px solid rgba(200,168,75,0.3); }
  .tag-phase { border: 1px solid; }

  .week-title-main {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: 0.06em;
    color: var(--text);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .week-theme {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.9rem;
  }

  .week-desc {
    font-size: 0.95rem;
    color: var(--text2);
    line-height: 1.65;
    max-width: 680px;
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem 1.25rem;
  }

  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 0.4rem;
  }

  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .stat-sub {
    font-size: 0.75rem;
    color: var(--text3);
    margin-top: 2px;
  }

  .intensity-bar {
    display: flex;
    gap: 3px;
    margin-top: 6px;
  }

  .intensity-seg {
    height: 4px;
    flex: 1;
    border-radius: 2px;
    background: var(--bg4);
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 0.75rem;
  }

  /* ── EXERCISE LIST ── */
  .exercise-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 2rem;
  }

  .ex-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 14px 16px;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
    cursor: default;
  }
  .ex-card:hover { border-color: var(--border2); background: var(--bg3); }

  .ex-icon {
    font-size: 1.4rem;
    width: 36px;
    text-align: center;
    flex-shrink: 0;
    line-height: 1;
  }

  .ex-info { flex: 1; min-width: 0; }

  .ex-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--text);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .ex-muscle {
    font-size: 0.78rem;
    color: var(--text3);
    letter-spacing: 0.02em;
  }

  .ex-metrics {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    align-items: center;
  }

  .metric-pill {
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .metric-pill.sets { color: var(--accent); border-color: rgba(200,168,75,0.2); background: rgba(200,168,75,0.06); }

  /* ── INFO BUTTON ── */
  .info-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text3);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    user-select: none;
    letter-spacing: 0;
  }
  .info-btn:hover, .info-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  /* ── POPOVER ── */
  .popover {
    display: none;
    position: absolute;
    left: 0;
    top: calc(100% + 8px);
    width: 420px;
    z-index: 100;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 16px 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    animation: fadeIn 0.12s ease;
  }

  .popover.open { display: block; }

  /* keep popover on screen if card is near right edge */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  .popover-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }

  .popover-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
    text-transform: uppercase;
  }

  .popover-muscle {
    font-size: 0.75rem;
    color: var(--text3);
    letter-spacing: 0.03em;
  }

  .popover-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 0 10px;
  }

  .popover-steps {
    list-style: none;
    margin: 0 0 12px;
    padding: 0;
  }

  .popover-steps li {
    display: flex;
    gap: 10px;
    font-size: 0.83rem;
    color: var(--text2);
    line-height: 1.5;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .popover-steps li:last-child { border-bottom: none; }

  .step-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 16px;
    padding-top: 1px;
    letter-spacing: 0.04em;
  }

  .video-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid rgba(200,168,75,0.3);
    border-radius: 4px;
    padding: 5px 12px;
    transition: all 0.15s;
  }
  .video-link:hover {
    background: rgba(200,168,75,0.1);
    border-color: var(--accent);
  }

  .video-icon {
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .video-icon::after {
    content: '';
    display: block;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 3.5px 0 3.5px 6px;
    border-color: transparent transparent transparent var(--bg);
    margin-left: 1px;
  }

  /* ── TIPS + GOAL ── */
  .bottom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .info-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem 1.25rem;
  }

  .info-box-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  .info-box p {
    font-size: 0.88rem;
    color: var(--text2);
    line-height: 1.55;
  }

  /* ── NAV BUTTONS ── */
  .week-nav {
    display: flex;
    gap: 1rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text2);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,168,75,0.06);
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .nav-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    margin-left: auto;
  }
  .nav-btn.primary:hover:not(:disabled) {
    background: var(--accent2);
    border-color: var(--accent2);
    color: var(--bg);
  }

  /* ── LOADING ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    gap: 1rem;
    color: var(--text3);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SCROLLBAR ── */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: var(--bg2); }
  .sidebar::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  /* ── PHASE COLORS ── */
  .phase-CONDITIONING { color: var(--phase-conditioning); border-color: rgba(74,144,217,0.35); background: rgba(74,144,217,0.08); }
  .phase-STRENGTH { color: var(--phase-strength); border-color: rgba(230,126,34,0.35); background: rgba(230,126,34,0.08); }
  .phase-ENDURANCE { color: var(--phase-endurance); border-color: rgba(192,57,43,0.35); background: rgba(192,57,43,0.08); }
  .phase-POWER { color: var(--phase-power); border-color: rgba(142,68,173,0.35); background: rgba(142,68,173,0.08); }
  .phase-ADVANCED-STRENGTH { color: var(--phase-advanced); border-color: rgba(22,160,133,0.35); background: rgba(22,160,133,0.08); }
  .phase-PEAK-CONDITIONING { color: var(--phase-peak); border-color: rgba(192,57,43,0.35); background: rgba(192,57,43,0.08); }
  .phase-SPECIALIZATION { color: var(--phase-specialization); border-color: rgba(211,84,0,0.35); background: rgba(211,84,0,0.08); }
  .phase-INTEGRATION { color: var(--phase-integration); border-color: rgba(39,174,96,0.35); background: rgba(39,174,96,0.08); }
  .phase-ELITE-GRADUATION { color: var(--accent); border-color: rgba(200,168,75,0.35); background: rgba(200,168,75,0.08); }

  .dot-CONDITIONING { background: var(--phase-conditioning); }
  .dot-STRENGTH { background: var(--phase-strength); }
  .dot-ENDURANCE { background: var(--phase-endurance); }
  .dot-POWER { background: var(--phase-power); }
  .dot-ADVANCED.STRENGTH { background: var(--phase-advanced); }
  .dot-PEAK.CONDITIONING { background: var(--phase-peak); }
  .dot-SPECIALIZATION { background: var(--phase-specialization); }
  .dot-INTEGRATION { background: var(--phase-integration); }
  .dot-ELITE.GRADUATION { background: var(--accent); }

  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .bottom-grid { grid-template-columns: 1fr; }
    .popover { width: calc(100vw - 2rem); left: 0; right: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    IRON 52
    <span>Military Fitness Program</span>
  </div>
  <div class="header-right">
    <div class="week-badge" id="header-badge">Week <strong id="header-week-num">1</strong> of 52</div>
  </div>
</header>

<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">Program Overview</div>
    <div id="sidebar-weeks"></div>
  </nav>

  <main class="main" id="main-content">
    <div class="loading"><div class="spinner"></div>Loading program...</div>
  </main>
</div>

<script>
  let currentWeek = 1;
  let overview = [];
  let activePopover = null;

  // ── PHASE COLOR HELPER ──
  function phaseClass(phase) {
    return 'phase-' + phase.replace(/\s+/g, '-').toUpperCase();
  }
  function dotClass(phase) {
    return 'dot-' + phase.toUpperCase();
  }

  function intensityColor(intensity) {
    if (intensity <= 2) return '#27ae60';
    if (intensity <= 4) return '#f39c12';
    if (intensity <= 6) return '#e67e22';
    if (intensity <= 8) return '#e74c3c';
    return '#c0392b';
  }

  // ── SIDEBAR ──
  async function loadOverview() {
    const res = await fetch('/api/program/overview');
    overview = await res.json();
    renderSidebar();
  }

  function renderSidebar() {
    const container = document.getElementById('sidebar-weeks');
    // Group by phase
    let lastPhase = null;
    let html = '';
    overview.forEach(w => {
      if (w.phase !== lastPhase) {
        if (lastPhase !== null) html += '</div>';
        html += `<div class="phase-group"><div class="phase-label">${w.phase}</div>`;
        lastPhase = w.phase;
      }
      const dotCls = dotClass(w.phase);
      html += `
        <button class="week-btn" id="sidebar-week-${w.week}" onclick="loadWeek(${w.week})">
          <span class="week-num">W${String(w.week).padStart(2,'0')}</span>
          <span class="week-title">${w.title}</span>
          <span class="intensity-dot ${dotCls}" style="background:${intensityColor(w.intensity)}"></span>
        </button>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }

  function updateSidebarActive(week) {
    document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(`sidebar-week-${week}`);
    if (btn) {
      btn.classList.add('active');
      btn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  // ── LOAD WEEK ──
  async function loadWeek(week) {
    currentWeek = week;
    document.getElementById('header-week-num').textContent = week;
    updateSidebarActive(week);
    closeAllPopovers();

    const main = document.getElementById('main-content');
    main.innerHTML = '<div class="loading"><div class="spinner"></div>Loading week ' + week + '...</div>';

    const res = await fetch(`/api/week/${week}`);
    const data = await res.json();
    renderWeek(data, main);
  }

  // ── RENDER WEEK ──
  function renderWeek(data, container) {
    const phaseCls = phaseClass(data.phase || '');
    const intensity = data.intensity || 5;

    // Intensity bar
    let intensityBar = '';
    for (let i = 1; i <= 10; i++) {
      const filled = i <= intensity;
      intensityBar += `<div class="intensity-seg" style="${filled ? `background:${intensityColor(intensity)}` : ''}"></div>`;
    }

    // Exercises
    let exerciseHTML = '';
    (data.exercises || []).forEach((ex, idx) => {
      const hasInstructions = ex.instructions && ex.instructions.length > 0;
      let stepsHTML = '';
      if (hasInstructions) {
        ex.instructions.forEach((step, si) => {
          stepsHTML += `<li><span class="step-num">${String(si+1).padStart(2,'0')}</span><span>${step}</span></li>`;
        });
      }

      const videoLink = ex.video_url
        ? `<a class="video-link" href="${ex.video_url}" target="_blank" rel="noopener">
            <span class="video-icon"></span>Watch demo on YouTube
           </a>`
        : '';

      exerciseHTML += `
        <div class="ex-card" id="ex-card-${idx}">
          <div class="ex-icon">${ex.icon || '💪'}</div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-muscle">${ex.muscle || ''}</div>
          </div>
          <div class="ex-metrics">
            <span class="metric-pill sets">${ex.sets} sets</span>
            <span class="metric-pill">${ex.reps} reps</span>
            <span class="metric-pill">rest ${ex.rest}</span>
          </div>
          ${hasInstructions ? `
          <button class="info-btn" data-idx="${idx}" title="How to perform this exercise">i</button>
          <div class="popover" id="popover-${idx}">
            <div class="popover-header">
              <div>
                <div class="popover-title">${ex.name}</div>
                <div class="popover-muscle">${ex.muscle || ''}</div>
              </div>
            </div>
            <div class="popover-divider"></div>
            <ol class="popover-steps">${stepsHTML}</ol>
            ${videoLink}
          </div>` : ''}
        </div>`;
    });

    container.innerHTML = `
      <div class="week-hero">
        <div class="week-meta">
          <span class="tag tag-week">Week ${data.week} / 52</span>
          <span class="tag tag-phase ${phaseCls}">${data.phase || ''}</span>
        </div>
        <div class="week-title-main">${data.title || ''}</div>
        <div class="week-theme">${data.theme || ''}</div>
        <p class="week-desc">${data.description || ''}</p>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Intensity</div>
          <div class="stat-value">${intensity}<span style="font-size:1rem;color:var(--text3)">/10</span></div>
          <div class="intensity-bar">${intensityBar}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Weekly Volume</div>
          <div class="stat-value">${data.volume || 0}<span style="font-size:0.9rem;color:var(--text3)"> reps</span></div>
          <div class="stat-sub">Total programmed volume</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Exercises</div>
          <div class="stat-value">${(data.exercises || []).length}</div>
          <div class="stat-sub">movements this week</div>
        </div>
      </div>

      <div class="section-title">Exercises — click <strong style="color:var(--accent)">i</strong> for form guide</div>
      <div class="exercise-list">${exerciseHTML}</div>

      <div class="bottom-grid">
        <div class="info-box">
          <div class="info-box-label">Training Tip</div>
          <p>${data.tips || '—'}</p>
        </div>
        <div class="info-box">
          <div class="info-box-label">Weekly Goal</div>
          <p>${data.weekly_goal || '—'}</p>
        </div>
      </div>

      <div class="week-nav">
        <button class="nav-btn" onclick="loadWeek(${data.week - 1})" ${data.week <= 1 ? 'disabled' : ''}>
          ← Week ${data.week - 1}
        </button>
        <button class="nav-btn primary" onclick="loadWeek(${data.week + 1})" ${data.week >= 52 ? 'disabled' : ''}>
          Week ${data.week + 1} →
        </button>
      </div>
    `;
  }

  // ── POPOVER TOGGLE ──
  function closeAllPopovers() {
    document.querySelectorAll('.popover.open').forEach(p => p.classList.remove('open'));
    document.querySelectorAll('.info-btn.active').forEach(b => b.classList.remove('active'));
    activePopover = null;
  }

  // Use event delegation on the document — avoids inline handler bugs
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.info-btn');
    if (btn) {
      e.stopPropagation();
      const idx = btn.dataset.idx;
      const popover = document.getElementById(`popover-${idx}`);
      if (!popover) return;

      const isOpen = popover.classList.contains('open');
      closeAllPopovers();

      if (!isOpen) {
        popover.classList.add('open');
        btn.classList.add('active');
        activePopover = idx;

        // Adjust if popover goes off right edge
        requestAnimationFrame(() => {
          const rect = popover.getBoundingClientRect();
          if (rect.right > window.innerWidth - 16) {
            popover.style.left = 'auto';
            popover.style.right = '0';
          } else {
            popover.style.left = '';
            popover.style.right = '';
          }
        });
      }
      return;
    }

    // Click outside any popover → close all
    if (!e.target.closest('.popover')) {
      closeAllPopovers();
    }
  });

  // Close popovers on Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeAllPopovers();
  });

  // ── INIT ──
  async function init() {
    await loadOverview();
    await loadWeek(1);
  }

  init();
</script>
</body>
</html>
